# --- QMIX specific parameters ---

# use epsilon greedy action selector
action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 50000  # 50000
evaluation_epsilon: 0.0

runner: "episode"

buffer_size: 5000

target_update_interval: 200

obs_agent_id: True
obs_last_action: True
obs_individual_obs: False

agent_output_type: "q"
learner: "q_learner"
double_q: True
mixer: "qmix"
use_rnn: True
mixing_embed_dim: 32
hypernet_layers: 2
hypernet_embed: 64

name: "qmix"
agent: "rnn"

add_state: False  