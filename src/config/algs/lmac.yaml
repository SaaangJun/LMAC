# --- QMIX specific parameters with New Meta Architecture v2 ---

# use epsilon greedy action selector
action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 50000  # 50000
evaluation_epsilon: 0.0

runner: "episode"
mac : "lmac_mac"
buffer_size: 5000

# update the target network every {} episodes
target_update_interval_or_tau: 200
target_update_interval: 200

message_dim: 3
obs_agent_id: True
obs_last_action: True
obs_individual_obs: False

# use the Q_Learner to train
standardise_returns: False
standardise_rewards: True

optimiser: "adam" 

agent_output_type: "q"
learner: "lmac_learner"
double_q: True
mixer: "qmix"
use_rnn: True
mixing_embed_dim: 32
hypernet_layers: 2
hypernet_embed: 64

latent_dim: 20



# Task-specific loss weights
recon_lambda: 1.0
meta_lambda: 0.1

max_retries: 10

name: "LMAC"
agent: "lmac"

time_seq: 10

meta: meta 
discriminator: Discriminator_net

consistency_lambda: 1
timestep_wise: False

mse_thres: 0.05

save_dir: "data/"
buffer_dir: "data/"

dir: "src/llm_source"
model: "gpt-4.1-mini-2025-04-14"   #"gpt-4.1-mini-2025-04-14", "gemini-1.5-flash", "claude-3-opus-20240229", "gpt-4.1-mini" # "deepseek-r1:14b" #"llama3"
openai_key: "..."
gemini_key: "..."
claude_key: "..."

dropout: 0.1
n_epochs: 10
save_data: False
